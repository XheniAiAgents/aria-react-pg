[phases.setup]
nixPkgs = ["python311", "nodejs_18", "npm-9_x"]

[phases.install]
cmds = [
  "npm ci",
  "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p backend/frontend",
  "cp -r dist/* backend/frontend/"
]

[start]
cmd = "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
